<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Pantalla Principal</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <h1>Scraping - RPA 1</h1>
    </header>
    <main >
        <div class="container">
            <h2 class=" d-flex justify-content-center my-3 tituloPrincipal">Servicios disponibles</h2>
            <div class="accordion" id="accordionExample">
                {% for servicio in servicios %}
                <div class="accordion-item">
                  <h2 class="accordion-header" id="heading{{ loop.index }}">
                    <button class="accordion-button {{ 'collapsed' if not loop.first }}" 
                            type="button" 
                            data-bs-toggle="collapse" 
                            data-bs-target="#collapse{{ loop.index }}" 
                            aria-expanded="{{ 'true' if loop.first else 'false' }}" 
                            aria-controls="collapse{{ loop.index }}">
                      {{ servicio }}
                    </button>
                  </h2>
                  <div id="collapse{{ loop.index }}" 
                       class="accordion-collapse collapse {{ 'show' if loop.first }}" 
                       aria-labelledby="heading{{ loop.index }}" 
                       data-bs-parent="#accordionExample">
                    <div class="accordion-body">
                      <strong>Sistema de descargas de facturación   </strong>
                    </div>
                    <button type="button" class="btn btn-primary mx-3 my-3 button">Descargar Facturas</button>
                    <button type="button" class="btn btn-success mx-3 my-3 button">Configuración</button>
                  </div>
                </div>
                {% endfor %}
              </div>
        </div>
    </main>
    <footer>
        <p></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
